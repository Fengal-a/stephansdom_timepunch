server {
    listen 80;
    server_name domstempel.at;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name domstempel.at;

    ssl_certificate     /etc/letsencrypt/live/domstempel.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domstempel.at/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /usr/share/nginx/html;
    index index.html;

    # Forward API calls to the backend container
    location ~ ^/(auth|users|admin|messages)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # Also handle paths without trailing slash
    location ~ ^/(auth|users|admin|messages)$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # All other requests go to the React app (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
