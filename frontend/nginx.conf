server {
    listen 80;

    # Serve the React app
    root /usr/share/nginx/html;
    index index.html;

    # Forward API calls to the backend container
    location ~ ^/(auth|users|admin|messages)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Also handle paths without trailing slash
    location ~ ^/(auth|users|admin|messages)$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # All other requests go to the React app (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
